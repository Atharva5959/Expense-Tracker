<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

    <h1>Register</h1>

    <input
        type="text"
        id="name"
        placeholder="Name">

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="registerUser()">
        Register
    </button>

    <p>
        Already have account?
        <a href="/">
            Login
        </a>
    </p>

</div>

<script src="/js/register.js"></script>

</body>
</html>
